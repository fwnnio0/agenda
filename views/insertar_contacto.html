<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Insertar Contacto</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
  <h1>Insertar Contacto</h1>
  <form method="POST" action="/insertar_contacto">
    <div class="mb-3">
      <label>Nombre</label>
      <input type="text" name="nombre" class="form-control">
    </div>
    <div class="mb-3">
      <label>Primer Apellido</label>
      <input type="text" name="primer_apellido" class="form-control">
    </div>
    <div class="mb-3">
      <label>Segundo Apellido</label>
      <input type="text" name="segundo_apellido" class="form-control">
    </div>
    <button type="submit" class="btn btn-primary">Guardar</button>
    <a href="/lista_contactos" class="btn btn-secondary">Cancelar</a>
  </form>
</body>
</html>
