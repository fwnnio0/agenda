<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Editar Contacto</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4" style="max-width: 400px;">

  <h4>Contacto - Editar contacto</h4>
  <hr>

  <form method="post" action="/editar_contacto">
    <div class="mb-2">
      <label>id</label>
      <input type="text" name="id" class="form-control" value="8" disabled>
    </div>
    <div class="mb-2">
      <label>Nombre</label>
      <input type="text" name="nombre" class="form-control" value="Dejah">
    </div>
    <div class="mb-2">
      <label>Primer Apellido</label>
      <input type="text" name="primer_apellido" class="form-control" value="Thoris">
    </div>
    <div class="mb-2">
      <label>Segundo Apellido</label>
      <input type="text" name="segundo_apellido" class="form-control" value="Mars">
    </div>
    <div class="mb-2">
      <label>Email</label>
      <input type="email" name="email" class="form-control" value="dejah@gio">
    </div>
    <div class="mb-2">
      <label>Teléfono</label>
      <input type="tel" name="telefono" class="form-control" value="1111111">
    </div>
    <a href="lista_contacto.html" class="btn btn-secondary btn-sm">Cancelar</a>
    <button type="submit" class="btn btn-warning btn-sm">Guardar cambios</button>
  </form>

</body>
</html>
