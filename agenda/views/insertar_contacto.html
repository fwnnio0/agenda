<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Insertar Contacto</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4" style="max-width: 400px;">

  <h4>Contacto - Insertar nuevo contacto</h4>
  <hr>

  <form method="post" action="/insertar_contacto">
    <div class="mb-2">
      <label>Nombre</label>
      <input type="text" name="nombre" class="form-control">
    </div>
    <div class="mb-2">
      <label>Primer Apellido</label>
      <input type="text" name="primer_apellido" class="form-control">
    </div>
    <div class="mb-2">
      <label>Segundo Apellido</label>
      <input type="text" name="segundo_apellido" class="form-control">
    </div>
    <div class="mb-2">
      <label>Email</label>
      <input type="email" name="email" class="form-control">
    </div>
    <div class="mb-2">
      <label>Teléfono</label>
      <input type="tel" name="telefono" class="form-control">
    </div>
    <button type="submit" class="btn btn-success btn-sm">Guardar</button>
    <a href="/lista_contacto" class="btn btn-secondary btn-sm">Descartar</a>
  </form>

</body>
</html>
